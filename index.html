<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ars Magna Mallorquensis</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: radial-gradient(ellipse at 50% 15%, #2d1504 0%, #0e0602 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'IM Fell English', serif;
  color: #e8d5a3;
  padding: 0 12px 40px;
  user-select: none;
}

/* ─── masthead ─── */
.masthead {
  text-align: center;
  padding: 24px 0 12px;
  border-bottom: 1px solid #4a2a08;
  width: 100%;
  max-width: 820px;
  margin-bottom: 14px;
}
h1 {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(1.3rem, 3.8vw, 2.4rem);
  color: #d4a843;
  text-shadow: 0 0 28px rgba(212,168,67,.4), 2px 2px 5px #000;
  letter-spacing: 3px;
}
.masthead .sub { color: #7a5a28; font-style: italic; font-size: .8rem; letter-spacing: 1.5px; margin-top: 4px; }
.masthead .hint { color: #4e3318; font-size: .73rem; margin-top: 7px; letter-spacing: 1px; }
#set-indicator { color: #8a6530; font-size: .73rem; margin-top: 4px; letter-spacing: 1px; font-style: italic; min-height: 1em; }

/* ─── tabs ─── */
.tabs { display: flex; margin-bottom: 18px; border-bottom: 2px solid #4a2a08; width:100%; max-width:820px; }
.tab-btn {
  font-family: 'Cinzel', serif;
  background: none; border: none;
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  padding: 8px 26px; color: #7a5a28; font-size: .85rem;
  letter-spacing: 2px; cursor: pointer; transition: color .2s, border-color .2s;
}
.tab-btn:hover { color: #d4a843; }
.tab-btn.active { color: #d4a843; border-bottom-color: #d4a843; }
.tab-pane { display: none; width: 100%; max-width: 820px; }
.tab-pane.active { display: block; }

/* ─── wheel pane ─── */
.wheel-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; }
#wheel-svg {
  width: 100%; max-width: 720px; height: auto;
  cursor: crosshair;
  filter: drop-shadow(0 0 44px rgba(160,100,20,.16));
}

/* ─── tooltip ─── */
#tooltip {
  position: fixed; pointer-events: none;
  background: rgba(8,4,1,.94); border: 1px solid #8B4513;
  color: #e8d5a3; font-family: 'IM Fell English', serif;
  font-style: italic; font-size: clamp(.88rem,1.8vw,1.08rem);
  padding: 8px 18px; max-width: 380px;
  display: none; z-index: 200;
  box-shadow: 0 4px 24px rgba(0,0,0,.7);
  line-height: 1.45; text-align: center;
}

/* ─── edit pane ─── */
.edit-wrap { max-width: 660px; margin: 0 auto; }

/* settings block */
.settings-block {
  border: 1px solid #3a1e08; margin-bottom: 20px; background: rgba(0,0,0,.35);
}
.settings-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 14px; cursor: pointer;
  font-family: 'Cinzel', serif; font-size: .78rem; letter-spacing: 1.5px; color: #7a5a28;
}
.settings-toggle:hover { color: #d4a843; }
.settings-body { padding: 12px 14px 14px; display: none; }
.settings-body.open { display: block; }
.field { margin-bottom: 12px; }
.field label { display: block; font-family: 'Cinzel', serif; font-size: .72rem; letter-spacing: 1px; color: #6a4a20; margin-bottom: 4px; }
.field input {
  width: 100%; background: rgba(0,0,0,.6); border: 1px solid #3a2008;
  color: #e0c880; font-family: monospace; font-size: .82rem; padding: 6px 10px;
}
.field input:focus { outline: none; border-color: #8a6020; }
#settings-msg { font-size: .75rem; font-style: italic; color: #8a6; margin-top: 6px; min-height: 1em; }

/* set selector */
.set-selector {
  display: flex; gap: 8px; align-items: center; margin-bottom: 18px; flex-wrap: wrap;
}
.set-selector label { font-family: 'Cinzel', serif; font-size: .75rem; color: #7a5a28; letter-spacing: 1px; }
select#set-select {
  background: rgba(0,0,0,.6); border: 1px solid #3a2008; color: #e0c880;
  font-family: 'IM Fell English', serif; font-size: .85rem; padding: 5px 10px; cursor: pointer;
  flex: 1; min-width: 120px;
}
select#set-select:focus { outline: none; border-color: #8a6020; }

/* ring fields */
.ring-field { margin-bottom: 14px; }
.ring-field label {
  display: block; font-family: 'Cinzel', serif; font-size: .72rem;
  letter-spacing: 1px; margin-bottom: 4px;
}
.ring-field textarea {
  width: 100%; background: rgba(0,0,0,.55); border: 1px solid #3a2008;
  color: #e0c880; font-family: 'IM Fell English', serif; font-size: .85rem;
  padding: 7px 10px; resize: vertical; min-height: 58px; border-radius: 1px;
}
.ring-field textarea:focus { outline: none; border-color: #8a6020; }

/* save section */
.save-section {
  border-top: 1px solid #3a1e08; padding-top: 14px; margin-top: 4px;
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.save-section label { font-family: 'Cinzel', serif; font-size: .72rem; color: #7a5a28; letter-spacing: 1px; white-space: nowrap; }
#save-set-name {
  background: rgba(0,0,0,.6); border: 1px solid #3a2008; color: #e0c880;
  font-family: 'IM Fell English', serif; font-size: .9rem; padding: 5px 10px; flex: 1; min-width: 100px;
}
#save-set-name:focus { outline: none; border-color: #8a6020; }

/* buttons */
.btn {
  font-family: 'Cinzel', serif; font-size: .75rem; letter-spacing: 1.5px;
  padding: 6px 18px; cursor: pointer; border: 1px solid #4a2e0e;
  background: rgba(20,10,2,.8); color: #c4903a; transition: border-color .2s, color .2s;
  white-space: nowrap;
}
.btn:hover { border-color: #c9911e; color: #d4a843; }
.btn.primary { background: linear-gradient(135deg, #3a2208, #6a4010); color: #d4a843; border-color: #6a4010; }
.btn.primary:hover { border-color: #c9911e; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
#edit-msg { width: 100%; font-size: .75rem; font-style: italic; color: #8a6; margin-top: 8px; min-height: 1em; }
#edit-err { width: 100%; font-size: .75rem; font-style: italic; color: #c04030; margin-top: 4px; min-height: 1em; }

footer { margin-top: 18px; font-size: .7rem; color: #3e2208; font-style: italic; text-align: center; }
</style>
</head>
<body>

<div class="masthead">
  <h1>Ars Magna Mallorquensis</h1>
  <div class="sub">Combinatoria Mystica · Post Conferentiam · MMXXV</div>
  <div class="hint">Hovra över hjulet för att läsa kombinationerna</div>
  <div id="set-indicator"></div>
</div>

<div class="tabs">
  <button class="tab-btn active" id="btn-wheel" onclick="switchTab('wheel')">HJULET</button>
  <button class="tab-btn" id="btn-edit" onclick="switchTab('edit')">REDIGERA</button>
</div>

<!-- ── WHEEL ── -->
<div class="tab-pane active" id="pane-wheel">
  <div class="wheel-wrap">
    <svg id="wheel-svg" viewBox="-550 -550 1100 1100" xmlns="http://www.w3.org/2000/svg">
      <defs id="defs"></defs>
      <circle cx="0" cy="0" r="540" fill="#0c0501"/>
      <g id="rings-g"></g>
      <g id="center-g"></g>
      <g>
        <polygon points="0,-547 -11,-520 11,-520" fill="#d4a843"/>
        <rect x="-2.5" y="-547" width="5" height="18" fill="#d4a843"/>
      </g>
      <circle cx="0" cy="0" r="538" fill="none" stroke="#5c3308" stroke-width="2"/>
      <circle cx="0" cy="0" r="543" fill="none" stroke="#2e1804" stroke-width="1"/>
    </svg>
  </div>
</div>

<!-- ── EDIT ── -->
<div class="tab-pane" id="pane-edit">
  <div class="edit-wrap">

    <!-- settings -->
    <div class="settings-block">
      <div class="settings-toggle" onclick="toggleSettings()">
        <span>⚙ &nbsp;GIST-INSTÄLLNINGAR</span>
        <span id="settings-arrow">▸</span>
      </div>
      <div class="settings-body" id="settings-body">
        <div class="field">
          <label>GIST ID</label>
          <input type="text" id="inp-gist-id" placeholder="32 tecken från gist-URL:en">
        </div>
        <div class="field">
          <label>PERSONAL ACCESS TOKEN &nbsp;(gist-scope)</label>
          <input type="password" id="inp-token" placeholder="ghp_…">
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button class="btn primary" onclick="saveSettings()">SPARA INSTÄLLNINGAR</button>
          <button class="btn" onclick="reloadFromGist()">LADDA OM FRÅN GIST</button>
        </div>
        <div id="settings-msg"></div>
      </div>
    </div>

    <!-- set selector -->
    <div class="set-selector">
      <label>UPPSÄTTNING:</label>
      <select id="set-select"></select>
      <button class="btn" onclick="loadSelectedSet()">LADDA</button>
      <button class="btn" onclick="deleteSet()" id="btn-delete">TA BORT</button>
    </div>

    <!-- ring fields (outermost first = index 5 down to 0) -->
    <div id="ring-fields"></div>

    <!-- save -->
    <div class="save-section">
      <label>SPARA SOM:</label>
      <input type="text" id="save-set-name" placeholder="mallorca2025">
      <button class="btn primary" onclick="saveSet()" id="btn-save">SPARA TILL GIST</button>
    </div>
    <div id="edit-msg"></div>
    <div id="edit-err"></div>

  </div>
</div>

<div id="tooltip"></div>
<footer>Inspirerat av Ramon Llull · Ars Generalis Ultima · c.&thinsp;1305 · Mallorca</footer>

<script>
/* ═══════════════════════════════════════════
   CONSTANTS & GEOMETRY
═══════════════════════════════════════════ */
const SVG_NS = 'http://www.w3.org/2000/svg';

const RINGS = [
  // [innerR, outerR, fillEven, fillOdd, textColor, fontSize]  index 0 = innermost
  [105, 205, '#4e1820', '#601e28', '#f5c4b0', 7.5],
  [205, 265, '#1b3f2e', '#225038', '#b0e8c4', 9.0],
  [265, 335, '#47280e', '#5a3412', '#f0d0a0', 7.5],
  [335, 400, '#1b2e58', '#223870', '#b8ccf5', 8.0],
  [400, 468, '#504000', '#665200', '#f0e090', 8.5],
  [468, 536, '#501828', '#642030', '#fad4b8', 9.5],
];

// Labels shown in edit form, outermost first
const RING_LABELS = [
  'Ring VI — Namn (yttersta ringen)',
  'Ring V — och + Namn',
  'Ring IV — Verb',
  'Ring III — Adverb',
  'Ring II — Prepositioner',
  'Ring I — Platser (innersta ringen)',
];
// Maps label index (0=outermost) to ringData index
const LABEL_TO_RING = [5, 4, 3, 2, 1, 0];

const DEFAULT_GIST_ID = '0b7040ac0af3c69559c6511afe957ee9';

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let allSets = {};
let currentSetName = 'default';
let ringData = [];
let currentRotations = new Array(6).fill(0);
let isSpinning = false;

/* ═══════════════════════════════════════════
   SETTINGS (localStorage)
═══════════════════════════════════════════ */
const S = {
  get gistId() { return localStorage.getItem('arsMagna_gistId') || DEFAULT_GIST_ID; },
  get token()  { return localStorage.getItem('arsMagna_token') || ''; },
  setGistId(v) { localStorage.setItem('arsMagna_gistId', v.trim()); },
  setToken(v)  { localStorage.setItem('arsMagna_token', v.trim()); },
};

function saveSettings() {
  const gid = document.getElementById('inp-gist-id').value.trim();
  const tok = document.getElementById('inp-token').value.trim();
  if (gid) S.setGistId(gid);
  if (tok) S.setToken(tok);
  msg('settings-msg', '✦ Sparat', 2000);
}

function toggleSettings() {
  const body  = document.getElementById('settings-body');
  const arrow = document.getElementById('settings-arrow');
  const open  = body.classList.toggle('open');
  arrow.textContent = open ? '▾' : '▸';
  if (open) {
    document.getElementById('inp-gist-id').value = S.gistId;
    document.getElementById('inp-token').value   = S.token;
  }
}

/* ═══════════════════════════════════════════
   GIST API
═══════════════════════════════════════════ */
async function gistRead(gistId) {
  const res = await fetch(`https://api.github.com/gists/${gistId}`, {
    headers: { 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!res.ok) throw new Error(`Gist-läsning misslyckades (${res.status})`);
  const data = await res.json();
  return JSON.parse(data.files['words.json'].content);
}

async function gistWrite(content) {
  const token = S.token;
  if (!token) throw new Error('Ingen token — fyll i den under ⚙ Inställningar');
  const res = await fetch(`https://api.github.com/gists/${S.gistId}`, {
    method: 'PATCH',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({
      files: { 'words.json': { content: JSON.stringify(content, null, 2) } }
    }),
  });
  if (!res.ok) throw new Error(`Sparning misslyckades (${res.status})`);
}

/* ═══════════════════════════════════════════
   LOAD / INIT
═══════════════════════════════════════════ */
function setNameFromHash() {
  const h = decodeURIComponent(location.hash.replace(/^#/, '').trim());
  return h || 'default';
}

function applySet(name) {
  currentSetName = name;
  ringData = allSets[name] || allSets['default'] || Object.values(allSets)[0];
  currentRotations = new Array(ringData.length).fill(0);
  updateSetIndicator();
}

function updateSetIndicator() {
  document.getElementById('set-indicator').textContent =
    currentSetName !== 'default' ? `Aktiv uppsättning: ${currentSetName}` : '';
}

async function loadFromGist() {
  try {
    allSets = await gistRead(S.gistId);
  } catch(e) {
    console.warn('Gist-fel, faller tillbaka på words.json:', e.message);
    try {
      const arr = await fetch('words.json').then(r => r.json());
      allSets = { default: arr };
    } catch(e2) {
      allSets = {};
    }
  }
}

async function reloadFromGist() {
  msg('settings-msg', '…laddar', 0);
  await loadFromGist();
  applySet(currentSetName in allSets ? currentSetName : 'default');
  renderWheel(); spinWheel(); buildEditForm();
  msg('settings-msg', '✦ Laddat', 2000);
}

async function init() {
  currentSetName = setNameFromHash();
  await loadFromGist();
  applySet(currentSetName in allSets ? currentSetName : 'default');
  renderWheel();
  spinWheel();
  buildEditForm();
}

/* ═══════════════════════════════════════════
   SVG HELPERS
═══════════════════════════════════════════ */
function el(tag, attrs, text) {
  const e = document.createElementNS(SVG_NS, tag);
  for (const [k,v] of Object.entries(attrs || {})) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}
function pt(r, deg) {
  const a = (deg - 90) * Math.PI / 180;
  return { x: r * Math.cos(a), y: r * Math.sin(a) };
}
function sectorD(r1, r2, a1, a2) {
  const p1=pt(r1,a1), p2=pt(r1,a2), p3=pt(r2,a2), p4=pt(r2,a1);
  const lg = (a2-a1)>180 ? 1 : 0;
  return `M${p1.x},${p1.y} A${r1},${r1} 0 ${lg} 1 ${p2.x},${p2.y}`
       + ` L${p3.x},${p3.y} A${r2},${r2} 0 ${lg} 0 ${p4.x},${p4.y} Z`;
}

/* ═══════════════════════════════════════════
   RING DRAWING
═══════════════════════════════════════════ */
function buildRing(ri, words) {
  const [r1, r2, c0, c1, tc, fs] = RINGS[ri];
  const n = words.length, step = 360/n, midR = (r1+r2)/2;
  const g = el('g', { id: `ring-${ri}` });
  for (let i = 0; i < n; i++) {
    const a1=i*step, a2=a1+step, mid=a1+step/2;
    g.appendChild(el('path', { d: sectorD(r1+.5,r2-.5,a1,a2), fill: i%2?c1:c0, stroke:'#08030100','stroke-width':'0' }));
    const pd1=pt(r1,a1), pd2=pt(r2,a1);
    g.appendChild(el('line', { x1:pd1.x,y1:pd1.y,x2:pd2.x,y2:pd2.y, stroke:'#0c0501','stroke-width':'1.2' }));
    const sg = el('g', { transform: `rotate(${mid})` });
    sg.appendChild(el('text', {
      x:0, y:String(-midR), 'text-anchor':'middle', 'dominant-baseline':'central',
      'font-family':'Cinzel,serif', 'font-size':String(fs), fill:tc, 'letter-spacing':'0.2'
    }, words[i]));
    g.appendChild(sg);
  }
  g.appendChild(el('circle',{cx:0,cy:0,r:r1,fill:'none',stroke:'#0c0501','stroke-width':'1.8'}));
  g.appendChild(el('circle',{cx:0,cy:0,r:r2,fill:'none',stroke:'#0c0501','stroke-width':'1.8'}));
  g.appendChild(el('circle',{cx:0,cy:0,r:r2,fill:'none',stroke:'#5c3800','stroke-width':'0.7',opacity:'0.5'}));
  return g;
}

function buildCenter() {
  const R=105, g=el('g');
  g.appendChild(el('circle',{cx:0,cy:0,r:R,fill:'#090402'}));
  for (let r=R-7; r>18; r-=13)
    g.appendChild(el('circle',{cx:0,cy:0,r,fill:'none',stroke:'#3e1a08','stroke-width':'0.5',opacity:'0.6'}));
  const tR=R*.63;
  [[0,120,240],[60,180,300]].forEach((angles,ti) => {
    const pts=angles.map(a=>pt(tR,a));
    g.appendChild(el('polygon',{points:pts.map(p=>`${p.x},${p.y}`).join(' '),
      fill:'none',stroke:ti===0?'#8B3010':'#6B4010','stroke-width':'1',opacity:'0.65'}));
  });
  for (let i=0;i<8;i++) {
    const tip=pt(R*.27,i*45);
    g.appendChild(el('line',{x1:0,y1:0,x2:tip.x,y2:tip.y,stroke:'#7a3010','stroke-width':'0.6',opacity:'0.6'}));
  }
  for (let i=0;i<4;i++) {
    const tip=pt(R*.31,i*90),b1=pt(R*.08,i*90+90),b2=pt(R*.08,i*90-90);
    g.appendChild(el('path',{d:`M${tip.x},${tip.y} L${b1.x},${b1.y} L${b2.x},${b2.y} Z`,
      fill:i%2===0?'#c9911e':'#5c2a10',opacity:'0.88'}));
  }
  const letters=['B','C','D','E','F','G','H','I'];
  letters.forEach((ltr,i)=>{
    const p=pt(tR,i*45);
    g.appendChild(el('circle',{cx:p.x,cy:p.y,r:13,fill:'#180902',stroke:'#7a3010','stroke-width':'1'}));
    g.appendChild(el('text',{x:p.x,y:String(p.y+4.5),'text-anchor':'middle',
      'font-family':'Cinzel,serif','font-size':'11','font-weight':'700',fill:'#d4a843'},ltr));
  });
  g.appendChild(el('circle',{cx:0,cy:0,r:5,fill:'#d4a843'}));
  const defs=document.getElementById('defs'), pid='cpath';
  defs.appendChild(el('path',{id:pid,d:`M0,${-(R-7)} A${R-7},${R-7} 0 1 1 -0.001,${-(R-7)}`}));
  const txt=el('text',{'font-family':'Cinzel,serif','font-size':'6.5',fill:'#6a3010','letter-spacing':'2.5'});
  const tpr=el('textPath',{href:`#${pid}`,'startOffset':'0%'});
  tpr.textContent='ARS MAGNA · RVMÓN LLVLL · MALLORCA · ✦ · MDCCC · ✦ · ';
  txt.appendChild(tpr); g.appendChild(txt);
  g.appendChild(el('circle',{cx:0,cy:0,r:R,fill:'none',stroke:'#7a3010','stroke-width':'1.6'}));
  g.appendChild(el('circle',{cx:0,cy:0,r:R+4,fill:'none',stroke:'#2e1204','stroke-width':'1'}));
  return g;
}

function renderWheel() {
  const rg=document.getElementById('rings-g'), cg=document.getElementById('center-g');
  rg.innerHTML=''; cg.innerHTML='';
  for (let ri=ringData.length-1; ri>=0; ri--) rg.appendChild(buildRing(ri, ringData[ri]));
  cg.appendChild(buildCenter());
  currentRotations.forEach((r,i) => {
    const ring=document.getElementById(`ring-${i}`);
    if (ring) ring.setAttribute('transform',`rotate(${r})`);
  });
}

/* ═══════════════════════════════════════════
   SPIN
═══════════════════════════════════════════ */
function spinWheel() {
  if (isSpinning || !ringData.length) return;
  isSpinning = true;
  const DURATION=5000, startRots=[...currentRotations];
  const targetRots = ringData.map((words,i) => {
    const n=words.length, step=360/n;
    const dir=i%2===0?1:-1;
    const rounds=4+(5-i)+Math.floor(Math.random()*3);
    const extraSegs=Math.floor(Math.random()*n);
    return startRots[i]+dir*(rounds*360+extraSegs*step);
  });
  const t0=performance.now();
  function frame(now) {
    const t=Math.min((now-t0)/DURATION,1), e=1-Math.pow(1-t,4);
    for (let i=0;i<ringData.length;i++) {
      const ring=document.getElementById(`ring-${i}`);
      if (ring) ring.setAttribute('transform',`rotate(${startRots[i]+(targetRots[i]-startRots[i])*e})`);
    }
    if (t<1) { requestAnimationFrame(frame); }
    else { currentRotations=[...targetRots]; isSpinning=false; }
  }
  requestAnimationFrame(frame);
}

/* ═══════════════════════════════════════════
   HOVER TOOLTIP
═══════════════════════════════════════════ */
const tooltip=document.getElementById('tooltip');
function getWordAtAngle(angle, words, rotation) {
  const n=words.length, step=360/n;
  const localAngle=((angle-rotation)%360+360)%360;
  return words[Math.floor(localAngle/step)%n];
}
const svg=document.getElementById('wheel-svg');
svg.addEventListener('mousemove', e => {
  if (isSpinning) { tooltip.style.display='none'; return; }
  const rect=svg.getBoundingClientRect();
  const svgX=(e.clientX-rect.left)*(1100/rect.width)-550;
  const svgY=(e.clientY-rect.top)*(1100/rect.height)-550;
  const dist=Math.sqrt(svgX*svgX+svgY*svgY);
  if (dist<RINGS[0][0]||dist>RINGS[RINGS.length-1][1]) { tooltip.style.display='none'; return; }
  let angle=Math.atan2(svgX,-svgY)*180/Math.PI;
  if (angle<0) angle+=360;
  const words=ringData.map((rw,ri)=>getWordAtAngle(angle,rw,currentRotations[ri]));
  tooltip.textContent=[...words].reverse().join(' ');
  tooltip.style.display='block';
  let tx=e.clientX+14, ty=e.clientY-36;
  const tw=tooltip.offsetWidth||280;
  if (tx+tw>window.innerWidth-8) tx=e.clientX-tw-14;
  if (ty<8) ty=e.clientY+14;
  tooltip.style.left=tx+'px'; tooltip.style.top=ty+'px';
});
svg.addEventListener('mouseleave', ()=>{ tooltip.style.display='none'; });

/* ═══════════════════════════════════════════
   TABS
═══════════════════════════════════════════ */
function switchTab(which) {
  ['wheel','edit'].forEach(t=>{
    document.getElementById(`pane-${t}`).classList.toggle('active',t===which);
    document.getElementById(`btn-${t}`).classList.toggle('active',t===which);
  });
}

/* ═══════════════════════════════════════════
   EDIT FORM
═══════════════════════════════════════════ */
function buildEditForm() {
  buildSetSelector();
  buildRingFields(ringData);
  document.getElementById('save-set-name').value = currentSetName;
}

function buildSetSelector() {
  const sel=document.getElementById('set-select');
  sel.innerHTML='';
  Object.keys(allSets).forEach(name=>{
    const o=document.createElement('option');
    o.value=o.textContent=name;
    if (name===currentSetName) o.selected=true;
    sel.appendChild(o);
  });
}

function buildRingFields(data) {
  const container=document.getElementById('ring-fields');
  container.innerHTML='';
  RING_LABELS.forEach((lbl,li)=>{
    const ri=LABEL_TO_RING[li];
    const words=data[ri]||[];
    const div=document.createElement('div');
    div.className='ring-field';
    const label=document.createElement('label');
    label.textContent=lbl;
    label.style.color=RINGS[ri][4];
    const ta=document.createElement('textarea');
    ta.id=`rf-${ri}`;
    ta.rows=2;
    ta.value=words.join(', ');
    div.appendChild(label); div.appendChild(ta);
    container.appendChild(div);
  });
}

function loadSelectedSet() {
  const name=document.getElementById('set-select').value;
  if (!allSets[name]) return;
  applySet(name);
  buildRingFields(ringData);
  document.getElementById('save-set-name').value=name;
  renderWheel(); spinWheel();
  switchTab('wheel');
}

async function deleteSet() {
  const name=document.getElementById('set-select').value;
  if (name==='default') { showErr('Kan inte ta bort "default"'); return; }
  if (!confirm(`Ta bort uppsättningen "${name}"?`)) return;
  delete allSets[name];
  try {
    await gistWrite(allSets);
    if (currentSetName===name) applySet('default');
    buildEditForm(); renderWheel();
    msg('edit-msg','✦ Borttagen',2000);
  } catch(e) { showErr(e.message); }
}

async function saveSet() {
  const name=document.getElementById('save-set-name').value.trim();
  if (!name) { showErr('Ange ett namn'); return; }
  const newData=[];
  for (let ri=0;ri<6;ri++) {
    const ta=document.getElementById(`rf-${ri}`);
    const words=ta.value.split(',').map(w=>w.trim()).filter(Boolean);
    if (!words.length) { showErr(`Ring ${ri+1} är tom`); return; }
    newData[ri]=words;
  }
  allSets[name]=newData;
  const btn=document.getElementById('btn-save');
  btn.disabled=true; btn.textContent='SPARAR…';
  try {
    await gistWrite(allSets);
    applySet(name);
    buildEditForm(); renderWheel(); spinWheel();
    msg('edit-msg',`✦ "${name}" sparad till Gist`,3000);
    switchTab('wheel');
  } catch(e) { showErr(e.message); }
  finally { btn.disabled=false; btn.textContent='SPARA TILL GIST'; }
}

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
function msg(id, text, ms) {
  const el=document.getElementById(id);
  el.textContent=text;
  if (ms) setTimeout(()=>{ if(el.textContent===text) el.textContent=''; },ms);
}
function showErr(text) { msg('edit-err',text,4000); }

/* ═══════════════════════════════════════════
   BOOT
═══════════════════════════════════════════ */
init();
</script>
