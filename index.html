<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ars Magna Mallorquensis</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: radial-gradient(ellipse at 50% 15%, #2d1504 0%, #0e0602 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'IM Fell English', serif;
  color: #e8d5a3;
  padding: 0 12px 40px;
  user-select: none;
}

/* ─── masthead ─── */
.masthead {
  text-align: center;
  padding: 24px 0 12px;
  border-bottom: 1px solid #4a2a08;
  width: 100%;
  max-width: 820px;
  margin-bottom: 14px;
}
h1 {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(1.3rem, 3.8vw, 2.4rem);
  color: #d4a843;
  text-shadow: 0 0 28px rgba(212,168,67,.4), 2px 2px 5px #000;
  letter-spacing: 3px;
}
.masthead .sub { color: #7a5a28; font-style: italic; font-size: .8rem; letter-spacing: 1.5px; margin-top: 4px; }
#set-indicator { color: #8a6530; font-size: .73rem; margin-top: 4px; letter-spacing: 1px; font-style: italic; min-height: 1em; }

/* ─── wheel ─── */
.wheel-wrap { position: relative; display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%; max-width: 820px; }
#wheel-svg {
  width: 100%; max-width: 720px; height: auto;
  cursor: crosshair;
  filter: drop-shadow(0 0 44px rgba(160,100,20,.16));
}

/* ─── combo display ─── */
#combo-display {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  text-align: center;
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: clamp(2.2rem, 7vw, 3.6rem);
  color: #e8d5a3;
  line-height: 1.7;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  width: 55%; max-width: 400px;
  padding: 2em 1em;
  z-index: 10;
}


footer { margin-top: 18px; font-size: .7rem; color: #3e2208; font-style: italic; text-align: center; }
</style>
</head>
<body>

<div class="masthead">
  <h1>Ars Magna Mallorquensis</h1>
  <div class="sub">Combinatoria Mystica · Post Conferentiam · MMXXV</div>
  <div id="set-indicator"></div>
</div>

<div class="wheel-wrap">
  <svg id="wheel-svg" viewBox="-550 -550 1100 1100" xmlns="http://www.w3.org/2000/svg">
    <defs id="defs"></defs>
    <circle cx="0" cy="0" r="540" fill="#0c0501"/>
    <g id="rings-g"></g>
    <g id="center-g"></g>
    <g>
      <polygon points="0,-547 -11,-520 11,-520" fill="#d4a843"/>
      <rect x="-2.5" y="-547" width="5" height="18" fill="#d4a843"/>
    </g>
    <circle cx="0" cy="0" r="538" fill="none" stroke="#5c3308" stroke-width="2"/>
    <circle cx="0" cy="0" r="543" fill="none" stroke="#2e1804" stroke-width="1"/>
    <circle id="center-highlight" cx="0" cy="0" r="104" fill="rgba(212,168,67,0.12)" stroke="#d4a843" stroke-width="2" opacity="0" style="pointer-events:none;transition:opacity .15s"/>
  </svg>
  <div id="combo-display"></div>
</div>

<footer>Inspirerat av Ramon Llull · Ars Generalis Ultima · c.&thinsp;1305 · Mallorca</footer>

<script>
/* ═══════════════════════════════════════════
   CONSTANTS & GEOMETRY
═══════════════════════════════════════════ */
const SVG_NS = 'http://www.w3.org/2000/svg';

const RINGS = [
  // [innerR, outerR, fillEven, fillOdd, textColor, fontSize]  index 0 = innermost
  [105, 205, '#4e1820', '#601e28', '#f5c4b0', 7.5],
  [205, 265, '#1b3f2e', '#225038', '#b0e8c4', 9.0],
  [265, 335, '#47280e', '#5a3412', '#f0d0a0', 7.5],
  [335, 400, '#1b2e58', '#223870', '#b8ccf5', 8.0],
  [400, 468, '#504000', '#665200', '#f0e090', 8.5],
  [468, 536, '#501828', '#642030', '#fad4b8', 9.5],
];

const DEFAULT_GIST_ID = '0b7040ac0af3c69559c6511afe957ee9';

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let ringData = [];
let currentSetName = 'default';
let currentRotations = new Array(6).fill(0);
let isSpinning = false;

/* ═══════════════════════════════════════════
   SETTINGS (localStorage)
═══════════════════════════════════════════ */
const S = {
  get gistId() { return localStorage.getItem('arsMagna_gistId') || DEFAULT_GIST_ID; },
};

/* ═══════════════════════════════════════════
   GIST API
═══════════════════════════════════════════ */
async function gistRead(gistId) {
  const res = await fetch(`https://api.github.com/gists/${gistId}`, {
    headers: { 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!res.ok) throw new Error(`Gist-läsning misslyckades (${res.status})`);
  const data = await res.json();
  return JSON.parse(data.files['words.json'].content);
}

/* ═══════════════════════════════════════════
   LOAD / INIT
═══════════════════════════════════════════ */
function setNameFromHash() {
  const h = decodeURIComponent(location.hash.replace(/^#/, '').trim());
  return h || 'default';
}

function applySet(allSets, name) {
  currentSetName = name;
  ringData = allSets[name] || allSets['default'] || Object.values(allSets)[0];
  currentRotations = new Array(ringData.length).fill(0);
  const ind = document.getElementById('set-indicator');
  ind.textContent = currentSetName !== 'default' ? `Aktiv uppsättning: ${currentSetName}` : '';
}

async function init() {
  currentSetName = setNameFromHash();
  let allSets;
  try {
    allSets = await gistRead(S.gistId);
  } catch(e) {
    document.getElementById('set-indicator').textContent = 'Kunde inte ladda data: ' + e.message;
    document.getElementById('set-indicator').style.color = '#c04030';
    return;
  }
  if (!(currentSetName in allSets)) {
    document.getElementById('set-indicator').textContent = `Uppsättningen "${currentSetName}" finns inte`;
    document.getElementById('set-indicator').style.color = '#c04030';
    return;
  }
  applySet(allSets, currentSetName);
  renderWheel();
  spinWheel();
}

/* ═══════════════════════════════════════════
   SVG HELPERS
═══════════════════════════════════════════ */
function el(tag, attrs, text) {
  const e = document.createElementNS(SVG_NS, tag);
  for (const [k,v] of Object.entries(attrs || {})) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}
function pt(r, deg) {
  const a = (deg - 90) * Math.PI / 180;
  return { x: r * Math.cos(a), y: r * Math.sin(a) };
}
function sectorD(r1, r2, a1, a2) {
  const p1=pt(r1,a1), p2=pt(r1,a2), p3=pt(r2,a2), p4=pt(r2,a1);
  const lg = (a2-a1)>180 ? 1 : 0;
  return `M${p1.x},${p1.y} A${r1},${r1} 0 ${lg} 1 ${p2.x},${p2.y}`
       + ` L${p3.x},${p3.y} A${r2},${r2} 0 ${lg} 0 ${p4.x},${p4.y} Z`;
}

/* ═══════════════════════════════════════════
   RING DRAWING
═══════════════════════════════════════════ */
function buildRing(ri, words) {
  const [r1, r2, c0, c1, tc, fs] = RINGS[ri];
  const n = words.length, step = 360/n, midR = (r1+r2)/2;
  const g = el('g', { id: `ring-${ri}` });
  for (let i = 0; i < n; i++) {
    const a1=i*step, a2=a1+step, mid=a1+step/2;
    g.appendChild(el('path', { d: sectorD(r1+.5,r2-.5,a1,a2), fill: i%2?c1:c0, stroke:'#08030100','stroke-width':'0' }));
    const pd1=pt(r1,a1), pd2=pt(r2,a1);
    g.appendChild(el('line', { x1:pd1.x,y1:pd1.y,x2:pd2.x,y2:pd2.y, stroke:'#0c0501','stroke-width':'1.2' }));
    const sg = el('g', { transform: `rotate(${mid})` });
    sg.appendChild(el('text', {
      x:0, y:String(-midR), 'text-anchor':'middle', 'dominant-baseline':'central',
      'font-family':'Cinzel,serif', 'font-size':String(fs), fill:tc, 'letter-spacing':'0.2'
    }, words[i]));
    g.appendChild(sg);
  }
  g.appendChild(el('circle',{cx:0,cy:0,r:r1,fill:'none',stroke:'#0c0501','stroke-width':'1.8'}));
  g.appendChild(el('circle',{cx:0,cy:0,r:r2,fill:'none',stroke:'#0c0501','stroke-width':'1.8'}));
  g.appendChild(el('circle',{cx:0,cy:0,r:r2,fill:'none',stroke:'#5c3800','stroke-width':'0.7',opacity:'0.5'}));
  return g;
}

function buildCenter() {
  const R=105, g=el('g');
  g.appendChild(el('circle',{cx:0,cy:0,r:R,fill:'#090402'}));
  for (let r=R-7; r>18; r-=13)
    g.appendChild(el('circle',{cx:0,cy:0,r,fill:'none',stroke:'#3e1a08','stroke-width':'0.5',opacity:'0.6'}));
  const tR=R*.63;
  [[0,120,240],[60,180,300]].forEach((angles,ti) => {
    const pts=angles.map(a=>pt(tR,a));
    g.appendChild(el('polygon',{points:pts.map(p=>`${p.x},${p.y}`).join(' '),
      fill:'none',stroke:ti===0?'#8B3010':'#6B4010','stroke-width':'1',opacity:'0.65'}));
  });
  for (let i=0;i<8;i++) {
    const tip=pt(R*.27,i*45);
    g.appendChild(el('line',{x1:0,y1:0,x2:tip.x,y2:tip.y,stroke:'#7a3010','stroke-width':'0.6',opacity:'0.6'}));
  }
  for (let i=0;i<4;i++) {
    const tip=pt(R*.31,i*90),b1=pt(R*.08,i*90+90),b2=pt(R*.08,i*90-90);
    g.appendChild(el('path',{d:`M${tip.x},${tip.y} L${b1.x},${b1.y} L${b2.x},${b2.y} Z`,
      fill:i%2===0?'#c9911e':'#5c2a10',opacity:'0.88'}));
  }
  const letters=['B','C','D','E','F','G','H','I'];
  letters.forEach((ltr,i)=>{
    const p=pt(tR,i*45);
    g.appendChild(el('circle',{cx:p.x,cy:p.y,r:13,fill:'#180902',stroke:'#7a3010','stroke-width':'1'}));
    g.appendChild(el('text',{x:p.x,y:String(p.y+4.5),'text-anchor':'middle',
      'font-family':'Cinzel,serif','font-size':'11','font-weight':'700',fill:'#d4a843'},ltr));
  });
  g.appendChild(el('circle',{cx:0,cy:0,r:5,fill:'#d4a843'}));
  const defs=document.getElementById('defs'), pid='cpath';
  defs.appendChild(el('path',{id:pid,d:`M0,${-(R-7)} A${R-7},${R-7} 0 1 1 -0.001,${-(R-7)}`}));
  const txt=el('text',{'font-family':'Cinzel,serif','font-size':'6.5',fill:'#6a3010','letter-spacing':'2.5'});
  const tpr=el('textPath',{href:`#${pid}`,'startOffset':'0%'});
  tpr.textContent='ARS MAGNA · RVMÓN LLVLL · MALLORCA · ✦ · MDCCC · ✦ · ';
  txt.appendChild(tpr); g.appendChild(txt);
  g.appendChild(el('circle',{cx:0,cy:0,r:R,fill:'none',stroke:'#7a3010','stroke-width':'1.6'}));
  g.appendChild(el('circle',{cx:0,cy:0,r:R+4,fill:'none',stroke:'#2e1204','stroke-width':'1'}));
  return g;
}

function renderWheel() {
  const rg=document.getElementById('rings-g'), cg=document.getElementById('center-g');
  rg.innerHTML=''; cg.innerHTML='';
  for (let ri=ringData.length-1; ri>=0; ri--) rg.appendChild(buildRing(ri, ringData[ri]));
  cg.appendChild(buildCenter());
  currentRotations.forEach((r,i) => {
    const ring=document.getElementById(`ring-${i}`);
    if (ring) ring.setAttribute('transform',`rotate(${r})`);
  });
}

/* ═══════════════════════════════════════════
   SPIN
═══════════════════════════════════════════ */
function spinWheel() {
  if (isSpinning || !ringData.length) return;
  isSpinning = true;
  const DURATION=5000, startRots=[...currentRotations];
  const targetRots = ringData.map((words,i) => {
    const n=words.length, step=360/n;
    const dir=i%2===0?1:-1;
    const rounds=4+(5-i)+Math.floor(Math.random()*3);
    const extraSegs=Math.floor(Math.random()*n);
    return startRots[i]+dir*(rounds*360+extraSegs*step);
  });
  const t0=performance.now();
  function frame(now) {
    const t=Math.min((now-t0)/DURATION,1), e=1-Math.pow(1-t,4);
    for (let i=0;i<ringData.length;i++) {
      const ring=document.getElementById(`ring-${i}`);
      if (ring) ring.setAttribute('transform',`rotate(${startRots[i]+(targetRots[i]-startRots[i])*e})`);
    }
    if (t<1) { requestAnimationFrame(frame); }
    else { currentRotations=[...targetRots]; isSpinning=false; }
  }
  requestAnimationFrame(frame);
}

const svg=document.getElementById('wheel-svg');
const centerHL = document.getElementById('center-highlight');
svg.addEventListener('mousemove', e => {
  if (isSpinning) return;
  const rect=svg.getBoundingClientRect();
  const svgX=(e.clientX-rect.left)*(1100/rect.width)-550;
  const svgY=(e.clientY-rect.top)*(1100/rect.height)-550;
  const dist=Math.sqrt(svgX*svgX+svgY*svgY);
  centerHL.style.opacity = dist < RINGS[0][0] ? '1' : '0';
  if (dist<RINGS[0][0]||dist>RINGS[RINGS.length-1][1]) {
    document.getElementById('combo-display').innerHTML=''; return;
  }
  let angle=Math.atan2(svgX,-svgY)*180/Math.PI;
  if (angle<0) angle+=360;
  showCombo(angle);
});
svg.addEventListener('mouseleave', ()=>{
  document.getElementById('combo-display').innerHTML='';
  centerHL.style.opacity='0';
});

/* ═══════════════════════════════════════════
   COMBO DISPLAY
═══════════════════════════════════════════ */
function getWordAtAngle(angle, words, rotation) {
  const n=words.length, step=360/n;
  const localAngle=((angle-rotation)%360+360)%360;
  return words[Math.floor(localAngle/step)%n];
}

function showCombo(angle) {
  const w = ringData.map((rw, ri) => getWordAtAngle(angle, rw, currentRotations[ri]));
  // w[0]=plats, w[1]=prep, w[2]=adverb, w[3]=verb, w[4]=och+namn, w[5]=namn
  const line1 = w[5] + ' ' + w[4];
  const line2 = w[3] + ' ' + w[2];
  const line3 = w[1] + ' ' + w[0];
  const d = document.getElementById('combo-display');
  d.innerHTML = `<span>${line1}</span><span>${line2}</span><span>${line3}</span>`;
}

/* ═══════════════════════════════════════════
   BOOT
═══════════════════════════════════════════ */
svg.addEventListener('click', e => {
  if (isSpinning) return;
  const rect = svg.getBoundingClientRect();
  const svgX = (e.clientX - rect.left) * (1100 / rect.width) - 550;
  const svgY = (e.clientY - rect.top) * (1100 / rect.height) - 550;
  const dist = Math.sqrt(svgX * svgX + svgY * svgY);
  const inRing = dist >= RINGS[0][0] && dist <= RINGS[RINGS.length-1][1];
  if (inRing) {
    let angle = Math.atan2(svgX, -svgY) * 180 / Math.PI;
    if (angle < 0) angle += 360;
    showCombo(angle);
  } else {
    document.getElementById('combo-display').innerHTML = '';
    spinWheel();
  }
});
init();
</script>
</body>
</html>
