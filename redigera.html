<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redigera — Ars Magna Mallorquensis</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: radial-gradient(ellipse at 50% 15%, #2d1504 0%, #0e0602 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'IM Fell English', serif;
  color: #e8d5a3;
  padding: 0 12px 40px;
}

.masthead {
  text-align: center;
  padding: 24px 0 12px;
  border-bottom: 1px solid #4a2a08;
  width: 100%;
  max-width: 820px;
  margin-bottom: 24px;
}
h1 {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(1.1rem, 3vw, 1.8rem);
  color: #d4a843;
  text-shadow: 0 0 28px rgba(212,168,67,.4), 2px 2px 5px #000;
  letter-spacing: 3px;
}
.masthead .sub { color: #7a5a28; font-style: italic; font-size: .8rem; letter-spacing: 1.5px; margin-top: 4px; }
.back-link {
  display: inline-block;
  margin-top: 10px;
  font-family: 'Cinzel', serif;
  font-size: .72rem;
  letter-spacing: 1.5px;
  color: #6a4a20;
  text-decoration: none;
}
.back-link:hover { color: #d4a843; }

.edit-wrap { max-width: 660px; width: 100%; margin: 0 auto; }

/* settings block */
.settings-block {
  border: 1px solid #3a1e08; margin-bottom: 20px; background: rgba(0,0,0,.35);
}
.settings-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 14px; cursor: pointer;
  font-family: 'Cinzel', serif; font-size: .78rem; letter-spacing: 1.5px; color: #7a5a28;
}
.settings-toggle:hover { color: #d4a843; }
.settings-body { padding: 12px 14px 14px; display: none; }
.settings-body.open { display: block; }
.field { margin-bottom: 12px; }
.field label { display: block; font-family: 'Cinzel', serif; font-size: .72rem; letter-spacing: 1px; color: #6a4a20; margin-bottom: 4px; }
.field input {
  width: 100%; background: rgba(0,0,0,.6); border: 1px solid #3a2008;
  color: #e0c880; font-family: monospace; font-size: .82rem; padding: 6px 10px;
}
.field input:focus { outline: none; border-color: #8a6020; }
#settings-msg { font-size: .75rem; font-style: italic; color: #8a6; margin-top: 6px; min-height: 1em; }

/* set selector */
.set-selector {
  display: flex; gap: 8px; align-items: center; margin-bottom: 18px; flex-wrap: wrap;
}
.set-selector label { font-family: 'Cinzel', serif; font-size: .75rem; color: #7a5a28; letter-spacing: 1px; }
select#set-select {
  background: rgba(0,0,0,.6); border: 1px solid #3a2008; color: #e0c880;
  font-family: 'IM Fell English', serif; font-size: .85rem; padding: 5px 10px; cursor: pointer;
  flex: 1; min-width: 120px;
}
select#set-select:focus { outline: none; border-color: #8a6020; }

/* ring fields */
.ring-field { margin-bottom: 14px; }
.ring-field label {
  display: block; font-family: 'Cinzel', serif; font-size: .72rem;
  letter-spacing: 1px; margin-bottom: 4px;
}
.ring-field textarea {
  width: 100%; background: rgba(0,0,0,.55); border: 1px solid #3a2008;
  color: #e0c880; font-family: 'IM Fell English', serif; font-size: .85rem;
  padding: 7px 10px; resize: vertical; min-height: 58px; border-radius: 1px;
}
.ring-field textarea:focus { outline: none; border-color: #8a6020; }

/* save section */
.save-section {
  border-top: 1px solid #3a1e08; padding-top: 14px; margin-top: 4px;
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.save-section label { font-family: 'Cinzel', serif; font-size: .72rem; color: #7a5a28; letter-spacing: 1px; white-space: nowrap; }
#save-set-name {
  background: rgba(0,0,0,.6); border: 1px solid #3a2008; color: #e0c880;
  font-family: 'IM Fell English', serif; font-size: .9rem; padding: 5px 10px; flex: 1; min-width: 100px;
}
#save-set-name:focus { outline: none; border-color: #8a6020; }

/* buttons */
.btn {
  font-family: 'Cinzel', serif; font-size: .75rem; letter-spacing: 1.5px;
  padding: 6px 18px; cursor: pointer; border: 1px solid #4a2e0e;
  background: rgba(20,10,2,.8); color: #c4903a; transition: border-color .2s, color .2s;
  white-space: nowrap;
}
.btn:hover { border-color: #c9911e; color: #d4a843; }
.btn.primary { background: linear-gradient(135deg, #3a2208, #6a4010); color: #d4a843; border-color: #6a4010; }
.btn.primary:hover { border-color: #c9911e; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
#edit-msg { width: 100%; font-size: .75rem; font-style: italic; color: #8a6; margin-top: 8px; min-height: 1em; }
#edit-err { width: 100%; font-size: .75rem; font-style: italic; color: #c04030; margin-top: 4px; min-height: 1em; }

footer { margin-top: 18px; font-size: .7rem; color: #3e2208; font-style: italic; text-align: center; }
</style>
</head>
<body>

<div class="masthead">
  <h1>Ars Magna Mallorquensis</h1>
  <div class="sub">Redigera orduppsättningar</div>
  <a class="back-link" href="index.html">← TILLBAKA TILL HJULET</a>
</div>

<div class="edit-wrap">

  <!-- settings -->
  <div class="settings-block">
    <div class="settings-toggle" onclick="toggleSettings()">
      <span>⚙ &nbsp;GIST-INSTÄLLNINGAR</span>
      <span id="settings-arrow">▸</span>
    </div>
    <div class="settings-body" id="settings-body">
      <div class="field">
        <label>GIST ID</label>
        <input type="text" id="inp-gist-id" placeholder="32 tecken från gist-URL:en">
      </div>
      <div class="field">
        <label>PERSONAL ACCESS TOKEN &nbsp;(gist-scope)</label>
        <input type="password" id="inp-token" placeholder="ghp_…">
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="btn" onclick="reloadFromGist()">LADDA OM FRÅN GIST</button>
      </div>
      <div id="settings-msg"></div>
    </div>
  </div>

  <!-- set selector -->
  <div class="set-selector">
    <label>UPPSÄTTNING:</label>
    <select id="set-select"></select>
    <button class="btn" onclick="loadSelectedSet()">LADDA</button>
    <button class="btn" onclick="deleteSet()" id="btn-delete">TA BORT</button>
  </div>

  <!-- ring fields (outermost first = index 5 down to 0) -->
  <div id="ring-fields"></div>

  <!-- save -->
  <div class="save-section">
    <label>SPARA SOM:</label>
    <input type="text" id="save-set-name" placeholder="mallorca2025">
    <button class="btn primary" onclick="saveSet()" id="btn-save">SPARA TILL GIST</button>
  </div>
  <div id="edit-msg"></div>
  <div id="edit-err"></div>

</div>

<footer>Inspirerat av Ramon Llull · Ars Generalis Ultima · c.&thinsp;1305 · Mallorca</footer>

<script>
const DEFAULT_GIST_ID = '0b7040ac0af3c69559c6511afe957ee9';

// Labels shown in edit form, outermost first
const RING_LABELS = [
  'Ring VI — Namn (yttersta ringen)',
  'Ring V — och + Namn',
  'Ring IV — Verb',
  'Ring III — Adverb',
  'Ring II — Prepositioner',
  'Ring I — Platser (innersta ringen)',
];
const RING_COLORS = ['#fad4b8','#f0e090','#b8ccf5','#f0d0a0','#b0e8c4','#f5c4b0'];
const LABEL_TO_RING = [5, 4, 3, 2, 1, 0];

/* ── Settings (localStorage, auto-save on input) ── */
const S = {
  get gistId() { return localStorage.getItem('arsMagna_gistId') || DEFAULT_GIST_ID; },
  get token()  { return localStorage.getItem('arsMagna_token') || ''; },
  setGistId(v) { localStorage.setItem('arsMagna_gistId', v.trim()); },
  setToken(v)  { localStorage.setItem('arsMagna_token', v.trim()); },
};

let allSets = {};
let currentSetName = 'default';

/* ── Gist API ── */
async function gistRead(gistId) {
  const res = await fetch(`https://api.github.com/gists/${gistId}`, {
    headers: { 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!res.ok) throw new Error(`Gist-läsning misslyckades (${res.status})`);
  const data = await res.json();
  return JSON.parse(data.files['words.json'].content);
}

async function gistWrite(content) {
  const token = S.token;
  if (!token) throw new Error('Ingen token — fyll i den under ⚙ Inställningar');
  const res = await fetch(`https://api.github.com/gists/${S.gistId}`, {
    method: 'PATCH',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({
      files: { 'words.json': { content: JSON.stringify(content, null, 2) } }
    }),
  });
  if (!res.ok) throw new Error(`Sparning misslyckades (${res.status})`);
}

/* ── Settings panel ── */
function toggleSettings() {
  const body  = document.getElementById('settings-body');
  const arrow = document.getElementById('settings-arrow');
  const open  = body.classList.toggle('open');
  arrow.textContent = open ? '▾' : '▸';
  if (open) {
    document.getElementById('inp-gist-id').value = S.gistId;
    document.getElementById('inp-token').value   = S.token;
  }
}

/* Auto-save token and gist ID as the user types */
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('inp-token').addEventListener('input', e => {
    S.setToken(e.target.value);
    msg('settings-msg', '✦ Token sparat', 1500);
  });
  document.getElementById('inp-gist-id').addEventListener('input', e => {
    S.setGistId(e.target.value);
  });
});

/* ── Load ── */
async function loadFromGist() {
  try {
    allSets = await gistRead(S.gistId);
  } catch(e) {
    console.warn('Gist-fel:', e.message);
    allSets = {};
    showErr('Kunde inte ladda från Gist: ' + e.message);
  }
}

async function reloadFromGist() {
  msg('settings-msg', '…laddar', 0);
  await loadFromGist();
  currentSetName = currentSetName in allSets ? currentSetName : 'default';
  buildEditForm();
  msg('settings-msg', '✦ Laddat', 2000);
}

/* ── Edit form ── */
function buildEditForm() {
  buildSetSelector();
  buildRingFields(allSets[currentSetName] || []);
  document.getElementById('save-set-name').value = currentSetName;
}

function buildSetSelector() {
  const sel = document.getElementById('set-select');
  sel.innerHTML = '';
  Object.keys(allSets).forEach(name => {
    const o = document.createElement('option');
    o.value = o.textContent = name;
    if (name === currentSetName) o.selected = true;
    sel.appendChild(o);
  });
}

function buildRingFields(data) {
  const container = document.getElementById('ring-fields');
  container.innerHTML = '';
  RING_LABELS.forEach((lbl, li) => {
    const ri = LABEL_TO_RING[li];
    const words = data[ri] || [];
    const div = document.createElement('div');
    div.className = 'ring-field';
    const label = document.createElement('label');
    label.textContent = lbl;
    label.style.color = RING_COLORS[ri];
    const ta = document.createElement('textarea');
    ta.id = `rf-${ri}`;
    ta.rows = 2;
    ta.value = words.join(', ');
    div.appendChild(label);
    div.appendChild(ta);
    container.appendChild(div);
  });
}

function loadSelectedSet() {
  const name = document.getElementById('set-select').value;
  if (!allSets[name]) return;
  currentSetName = name;
  buildRingFields(allSets[name]);
  document.getElementById('save-set-name').value = name;
}

async function deleteSet() {
  const name = document.getElementById('set-select').value;
  if (name === 'default') { showErr('Kan inte ta bort "default"'); return; }
  if (!confirm(`Ta bort uppsättningen "${name}"?`)) return;
  delete allSets[name];
  try {
    await gistWrite(allSets);
    if (currentSetName === name) currentSetName = 'default';
    buildEditForm();
    msg('edit-msg', '✦ Borttagen', 2000);
  } catch(e) { showErr(e.message); }
}

async function saveSet() {
  const name = document.getElementById('save-set-name').value.trim();
  if (!name) { showErr('Ange ett namn'); return; }
  const newData = [];
  for (let ri = 0; ri < 6; ri++) {
    const ta = document.getElementById(`rf-${ri}`);
    const words = ta.value.split(',').map(w => w.trim()).filter(Boolean);
    if (!words.length) { showErr(`Ring ${ri + 1} är tom`); return; }
    newData[ri] = words;
  }
  allSets[name] = newData;
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'SPARAR…';
  try {
    await gistWrite(allSets);
    currentSetName = name;
    buildEditForm();
    msg('edit-msg', `✦ "${name}" sparad till Gist`, 3000);
  } catch(e) { showErr(e.message); }
  finally { btn.disabled = false; btn.textContent = 'SPARA TILL GIST'; }
}

/* ── Utils ── */
function msg(id, text, ms) {
  const el = document.getElementById(id);
  el.textContent = text;
  if (ms) setTimeout(() => { if (el.textContent === text) el.textContent = ''; }, ms);
}
function showErr(text) { msg('edit-err', text, 4000); }

/* ── Boot ── */
async function init() {
  await loadFromGist();
  currentSetName = currentSetName in allSets ? currentSetName : 'default';
  buildEditForm();

  // If no token saved, open settings automatically
  if (!S.token) toggleSettings();
}
init();
</script>
</body>
</html>
